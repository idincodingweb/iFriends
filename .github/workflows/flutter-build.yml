name: Build iFriends APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch Kotlin & MinSDK Version (Auto-Fix Firebase D8)
        # Step ini otomatis memperbarui konfigurasi Gradle lo di memori GitHub Actions
        # tanpa lo harus ngedit file aslinya secara manual.
        run: |
          # Paksa Kotlin ke versi 1.9.22 biar gak crash baca metadata Firebase
          sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.9.22'/g" android/build.gradle
          
          # Paksa minSdkVersion ke 23 (syarat wajib firebase-auth 22.3.1)
          sed -i "s/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/g" android/app/build.gradle
          sed -i "s/minSdkVersion 21/minSdkVersion 23/g" android/app/build.gradle

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ifriends-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
